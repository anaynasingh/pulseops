[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production.variables]
NEXT_PUBLIC_API_URL = "https://task-planner-backend.up.railway.app"
NEXT_PUBLIC_APP_URL = "https://task-planner.up.railway.app"
NODE_ENV = "production"
